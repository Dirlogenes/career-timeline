<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Linha do tempo — carreira</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { overflow: hidden; width: 100%; }

  body {
    background: #191919;
    font-family: 'DM Sans', sans-serif;
    color: #e8e6e0;
    min-height: 100vh;
    padding: 32px 24px 48px;
  }

  h1 {
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #505048;
    margin-bottom: 44px;
  }

  .rows {
    display: flex;
    flex-direction: column;
    gap: 14px;
    margin-bottom: 20px;
  }

  .row {
    display: flex;
    align-items: center;
    height: 44px;
  }

  .bar-track {
    position: relative;
    flex: 1;
    height: 44px;
  }

  .year-grid-line {
    position: absolute;
    top: 0; bottom: 0;
    width: 1px;
    background: rgba(255,255,255,0.07);
    pointer-events: none;
  }

  .bar {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    height: 44px;
    border-radius: 100px;
    display: flex;
    align-items: center;
    overflow: visible;
    cursor: pointer;
    transition: filter 0.15s;
  }

  .bar:hover { filter: brightness(1.15); }

  .bar-logo {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 500;
    color: #fff;
    overflow: hidden;
    position: relative;
    z-index: 2;
    border: 2px solid rgba(255,255,255,0.1);
  }

  .bar-logo img {
    width: 100%; height: 100%;
    object-fit: cover;
    border-radius: 50%;
  }

  .bar-fill {
    position: absolute;
    left: 22px; top: 0; right: 0; bottom: 0;
    border-radius: 100px;
    z-index: 1;
  }

  .axis {
    position: relative;
    border-top: 1px solid rgba(255,255,255,0.06);
    height: 24px;
    margin-top: 4px;
  }

  .axis-tick {
    position: absolute;
    transform: translateX(-50%);
    font-size: 11px;
    color: #585850;
    letter-spacing: 0.03em;
    font-weight: 300;
    white-space: nowrap;
    top: 6px;
  }

  /* ── Card tooltip ── */
  .card {
    position: fixed;
    width: 300px;
    background: #191916;
    border: 1px solid rgba(255,255,255,0.09);
    border-radius: 14px;
    padding: 0;
    pointer-events: none;
    z-index: 9999;
    display: none;
    overflow: hidden;
    box-shadow: 0 16px 48px rgba(0,0,0,0.6);
  }

  .card-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 16px 12px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }

  .card-logo {
    width: 40px; height: 40px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 500; color: #fff;
    flex-shrink: 0;
    overflow: hidden;
    border: 1.5px solid rgba(255,255,255,0.1);
  }

  .card-logo img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

  .card-title {
    font-size: 14px;
    font-weight: 500;
    color: #e8e6e0;
    line-height: 1.3;
  }

  .card-role {
    font-size: 12px;
    color: #7a7a72;
    margin-top: 2px;
    line-height: 1.4;
  }

  .card-body {
    padding: 12px 16px 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .card-period {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: #6a6a62;
  }

  .card-period strong {
    color: #a0a098;
    font-weight: 400;
  }

  .card-dot {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: #3a3a36;
    flex-shrink: 0;
  }

  .card-section-label {
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #484840;
    margin-bottom: 5px;
  }

  .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
  }

  .tag {
    font-size: 11px;
    padding: 3px 9px;
    border-radius: 100px;
    font-weight: 400;
    border: 1px solid;
  }

  .tag-segment {
    background: rgba(255,255,255,0.04);
    border-color: rgba(255,255,255,0.09);
    color: #9a9a92;
  }

  .tag-skill {
    background: transparent;
    border-color: rgba(255,255,255,0.07);
    color: #7a7a72;
    font-style: italic;
  }

  .card-divider {
    height: 1px;
    background: rgba(255,255,255,0.05);
  }
</style>
</head>
<body>

function toFrac(ym) {
  return (ym[0] + (ym[1] - 1) / 12 - START_YEAR) / SPAN_PAD;
}

function duration(s, e) {
  const total = (e[0] - s[0]) * 12 + (e[1] - s[1]);
  const y = Math.floor(total / 12), m = total % 12;
  let str = "";
  if (y > 0) str += y + (y === 1 ? " ano" : " anos");
  if (m > 0) str += (str ? " e " : "") + m + (m === 1 ? " mês" : " meses");
  return str || "< 1 mês";
}

function fmtDate(ym) {
  const ms = ["jan","fev","mar","abr","mai","jun","jul","ago","set","out","nov","dez"];
  return ms[ym[1]-1] + " " + ym[0];
}

function hexToRgb(h) {
  return [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)].join(",");
}

function initials(n) {
  return n.split(" ").slice(0,2).map(w => w[0]).join("").toUpperCase();
}

const rowsEl = document.getElementById("rows");
const axisEl = document.getElementById("axis");
const cardEl = document.getElementById("card");

let activeBar = null;

function buildCard(c) {
  const rgb = hexToRgb(c.color);
  const logoHtml = c.logo
    ? `<img src="${c.logo}" alt="${c.name}">`
    : initials(c.name);

  const segTags  = c.segments.map(s => `<span class="tag tag-segment">${s}</span>`).join("");
  const skillTags = c.skills.map(s => `<span class="tag tag-skill">${s}</span>`).join("");

  cardEl.innerHTML = `
    <div class="card-header">
      <div class="card-logo" style="background:${c.color}">${logoHtml}</div>
      <div>
        <div class="card-title">${c.name}</div>
        <div class="card-role">${c.role}</div>
      </div>
    </div>
    <div class="card-body">
      <div class="card-period">
        <strong>${fmtDate(c.start)}</strong>
        <span>→</span>
        <strong>${fmtDate(c.end)}</strong>
        <div class="card-dot"></div>
        <span>${duration(c.start, c.end)}</span>
      </div>
      <div class="card-divider"></div>
      <div>
        <div class="card-section-label">Segmento</div>
        <div class="tags">${segTags}</div>
      </div>
      <div>
        <div class="card-section-label">Competências</div>
        <div class="tags">${skillTags}</div>
      </div>
    </div>
  `;
}

function positionCard(e) {
  const margin = 12;
  const cw = 300, ch = cardEl.offsetHeight || 260;
  const vw = window.innerWidth, vh = window.innerHeight;
  let x = e.clientX + margin;
  let y = e.clientY + margin;
  if (x + cw > vw - margin) x = e.clientX - cw - margin;
  if (y + ch > vh - margin) y = e.clientY - ch - margin;
  cardEl.style.left = x + "px";
  cardEl.style.top  = y + "px";
}

companies.forEach(c => {
  const left  = toFrac(c.start);
  const right = toFrac(c.end);
  const width = right - left;
  const rgb   = hexToRgb(c.color);

  const row = document.createElement("div");
  row.className = "row";

  const track = document.createElement("div");
  track.className = "bar-track";

  for (let y = START_YEAR; y <= END_YEAR; y++) {
    const gl = document.createElement("div");
    gl.className = "year-grid-line";
    gl.style.left = ((y - START_YEAR) / SPAN_PAD * 100).toFixed(3) + "%";
    track.appendChild(gl);
  }

  const bar = document.createElement("div");
  bar.className = "bar";
  bar.style.left  = (left  * 100).toFixed(3) + "%";
  bar.style.width = (width * 100).toFixed(3) + "%";

  const logoDiv = document.createElement("div");
  logoDiv.className = "bar-logo";
  logoDiv.style.background = 'transparent';
  logoDiv.innerHTML = c.logo ? `<img src="${c.logo}" alt="${c.name}">` : initials(c.name);

  const fill = document.createElement("div");
  fill.className = "bar-fill";
  fill.style.background = `linear-gradient(90deg, rgba(${rgb},0.75) 0%, rgba(${rgb},0.30) 55%, rgba(${rgb},0.04) 100%)`;

  bar.appendChild(logoDiv);
  bar.appendChild(fill);

  bar.addEventListener("mouseenter", e => {
    activeBar = c;
    buildCard(c);
    cardEl.style.display = "block";
    positionCard(e);
  });
  bar.addEventListener("mousemove", e => {
    if (activeBar === c) positionCard(e);
  });
  bar.addEventListener("mouseleave", () => {
    activeBar = null;
    cardEl.style.display = "none";
  });

  track.appendChild(bar);
  row.appendChild(track);
  rowsEl.appendChild(row);
});

for (let y = START_YEAR; y <= END_YEAR; y++) {
  const tick = document.createElement("div");
  tick.className = "axis-tick";
  tick.style.position = "absolute";
  tick.style.left = ((y - START_YEAR) / SPAN_PAD * 100).toFixed(3) + "%";
  tick.textContent = y;
  axisEl.appendChild(tick);
}
const lastTick = document.createElement("div");
lastTick.className = "axis-tick";
lastTick.style.position = "absolute";
lastTick.style.left = (SPAN / SPAN_PAD * 100).toFixed(3) + "%";
lastTick.textContent = END_YEAR;
axisEl.appendChild(lastTick);
</script>
</body>
</html>
